<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="{{csp}}" />
  <title>Snapmark — Annotate</title>
  <link rel="stylesheet" href="{{styleUri}}" />
</head>
<body>
  <div id="toolbar" role="toolbar" aria-label="Annotation tools">
    <div class="tool-group" data-group="tools">
      <button class="tool" data-tool="select" title="Select (V)" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 17 2.51-7.39L20 10.07z"/></svg>
      </button>
      <button class="tool" data-tool="pen" title="Pen (P)" aria-pressed="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
      </button>
      <button class="tool" data-tool="arrow" title="Arrow (A)" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="9 5 19 5 19 15"/></svg>
      </button>
      <button class="tool" data-tool="rect" title="Rectangle (R)" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="1"/></svg>
      </button>
      <button class="tool" data-tool="ellipse" title="Ellipse" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="9" ry="6"/></svg>
      </button>
      <button class="tool" data-tool="text" title="Text (T)" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      </button>
      <button class="tool" data-tool="highlight" title="Highlight" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l-6 6v3h3l6-6"/><path d="M22 12l-4.5 4.5a2.1 2.1 0 0 1-3 0L9 12l6-6 4.5 4.5a2.1 2.1 0 0 1 0 3z"/></svg>
      </button>
      <button class="tool" data-tool="crop" title="Crop (C)" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M18 22V8a2 2 0 0 0-2-2H2"/></svg>
      </button>
      <button class="tool" data-tool="redact" title="Redact — pixelate sensitive region (B)" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h4v4H3z"/><path d="M10 3h4v4h-4z"/><path d="M17 3h4v4h-4z"/><path d="M3 10h4v4H3z"/><path d="M17 10h4v4h-4z"/><path d="M3 17h4v4H3z"/><path d="M10 17h4v4h-4z"/><path d="M17 17h4v4h-4z"/></svg>
      </button>
      <button class="tool" data-tool="number" title="Numbered step (N)" aria-pressed="false">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><text x="12" y="16" text-anchor="middle" font-size="10" font-family="sans-serif" font-weight="600" fill="currentColor" stroke="none">1</text></svg>
      </button>
    </div>

    <div class="divider"></div>

    <div class="tool-group" data-group="colors">
      <button class="swatch" data-color="#ef4444" style="--swatch:#ef4444" title="Red" aria-pressed="true"></button>
      <button class="swatch" data-color="#f59e0b" style="--swatch:#f59e0b" title="Amber"></button>
      <button class="swatch" data-color="#10b981" style="--swatch:#10b981" title="Green"></button>
      <button class="swatch" data-color="#3b82f6" style="--swatch:#3b82f6" title="Blue"></button>
      <button class="swatch" data-color="#a855f7" style="--swatch:#a855f7" title="Purple"></button>
      <button class="swatch" data-color="#ffffff" style="--swatch:#ffffff" title="White"></button>
      <button class="swatch" data-color="#000000" style="--swatch:#000000" title="Black"></button>
    </div>

    <div class="divider"></div>

    <div class="tool-group" data-group="widths">
      <button class="width" data-width="2" title="Thin">
        <span class="width-dot" style="width:4px;height:4px"></span>
      </button>
      <button class="width" data-width="4" title="Medium" aria-pressed="true">
        <span class="width-dot" style="width:7px;height:7px"></span>
      </button>
      <button class="width" data-width="8" title="Thick">
        <span class="width-dot" style="width:11px;height:11px"></span>
      </button>
    </div>

    <div class="divider"></div>

    <div class="tool-group" data-group="history">
      <button class="action" id="btn-undo" title="Undo (⌘Z)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.7 2.9L3 13"/></svg>
      </button>
      <button class="action" id="btn-redo" title="Redo (⌘⇧Z)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6.7 2.9L21 13"/></svg>
      </button>
      <button class="action" id="btn-clear" title="Clear all annotations">Clear</button>
    </div>

    <div class="spacer"></div>

    <div class="tool-group" data-group="commit">
      <button class="action secondary" id="btn-cancel" title="Close (Esc)">Close</button>
      <button class="action primary" id="btn-done" title="Copy to clipboard (⌘⏎)">Copy</button>
    </div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="crop-actions" hidden>
      <button class="action secondary" id="crop-cancel" title="Cancel crop (Esc)">Cancel</button>
      <button class="action primary" id="crop-apply" title="Apply crop (Enter)">Apply crop</button>
    </div>
    <div id="empty-state">Loading image…</div>
  </div>

  <script nonce="{{nonce}}" src="{{fabricUri}}"></script>
  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
